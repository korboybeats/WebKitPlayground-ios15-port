name: Build iOS 15 WebKit (manual)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Select Xcode 15.4
        run: |
          sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Fetch WebKit source
        run: |
          git clone --depth 1 --branch releases/Apple/Safari-15-iOS-15.0 https://github.com/WebKit/WebKit.git WebKit-15.0

      - name: Copy shims and apply patch
        run: |
          cp -R scripts WebKit-15.0/
          git -C WebKit-15.0 apply ../ios15-port.patch

      - name: Build WebKit (device)
        run: |
          cd WebKit-15.0
          Tools/Scripts/build-webkit --ios-device --release --use-ccache \
            WK_USE_CCACHE=YES \
            ARCHS='arm64 arm64e' \
            GCC_TREAT_WARNINGS_AS_ERRORS=NO \
            OTHER_CFLAGS='$(inherited) -Wno-error -Wno-error=strict-prototypes -Wno-strict-prototypes -Wno-error=deprecated-declarations' \
            OTHER_CPLUSPLUSFLAGS='$(inherited) -Wno-error -Wno-error=deprecated-declarations'
